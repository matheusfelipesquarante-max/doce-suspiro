{% extends "base.html" %}

{% block title %}Editar Produto{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-warning text-dark">
<i class="bi bi-pencil-square"></i> Editar Produto
</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Nome</label>
<input type="text"
name="nome"
class="form-control"
value="{{ produto.nome }}"
required>
</div>

<div class="mb-3">
<label class="form-label">Categoria</label>
<input type="text"
name="categoria"
class="form-control"
value="{{ produto.categoria }}">
</div>

<div class="mb-3">
<label class="form-label">Preço</label>
<input type="number"
step="0.01"
name="preco"
class="form-control"
value="{{ produto.preco }}">
</div>

<div class="mb-3">
<label class="form-label">Descrição</label>
<textarea name="descricao"
class="form-control"
rows="3">{{ produto.descricao }}</textarea>
</div>

<div class="mb-3">

<label class="form-label">Imagem atual</label>

{% if produto.imagem %}
<img src="{{ url_for('static', filename='produtos/' + produto.imagem) }}"
style="width:150px; display:block; margin-bottom:10px; border-radius:6px;">
{% else %}
<span class="text-muted">Sem imagem</span>
{% endif %}

<input type="file"
name="imagem"
class="form-control"
accept="image/*">

</div>

<div class="d-flex justify-content-between">

<a href="{{ url_for('admin_produtos_loja') }}"
class="btn btn-secondary">

<i class="bi bi-arrow-left"></i> Voltar

</a>

<button class="btn btn-success">

<i class="bi bi-save"></i> Salvar

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
