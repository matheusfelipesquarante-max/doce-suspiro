{% extends "base.html" %}

{% block title %}Emitir Comprovante - DOCE SUSPIRO{% endblock %}

{% block content %}

<div class="container mt-4">

<h3><i class="bi bi-printer"></i> Emitir Comprovante</h3>

<div class="card shadow p-4 mt-3">

<form method="POST">

<div class="row mb-3">
    <div class="col-md-6">
        <label>Tipo</label>
        <select name="tipo" class="form-select">
            <option value="Venda">Venda</option>
            <option value="Orçamento">Orçamento</option>
        </select>
    </div>

    <div class="col-md-6">
        <label>Método de Pagamento</label>
        <input type="text" name="pagamento" class="form-control">
    </div>
</div>

<div class="mb-3">
    <label>Valor adicional (Entrega/Frete)</label>
    <input type="number" step="0.01" name="valor_extra" class="form-control">
</div>

<div class="mb-3">
    <label>Observação</label>
    <textarea name="observacao" class="form-control"></textarea>
</div>

<label>Formato de Impressão</label>
<select name="formato" class="form-select" required>
    <option value="A4">A4</option>
    <option value="CUPOM">Cupom térmico</option>
</select>

<button type="submit" class="btn btn-success w-100">
    Gerar PDF
</button>

</form>

</div>

</div>

{% endblock %}
