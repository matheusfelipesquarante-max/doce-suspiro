{% extends "base.html" %}

{% block title %}Editar Cliente - DOCE SUSPIRO{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-warning">
<i class="bi bi-pencil"></i> Editar Cliente
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label class="form-label">Nome</label>

<input type="text"
       name="nome"
       class="form-control"
       value="{{ cliente.nome }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Telefone</label>

<input type="text"
       name="telefone"
       class="form-control"
       value="{{ cliente.telefone }}">
</div>

<div class="mb-3">
<label class="form-label">Documento</label>

<input type="text"
       name="documento"
       class="form-control"
       value="{{ cliente.documento }}">
</div>

<div class="mb-3">
<label class="form-label">Endereço</label>

<input type="text"
       name="endereco"
       class="form-control"
       value="{{ cliente.endereco }}">
</div>

<div class="d-flex justify-content-between">

<a href="{{ url_for('clientes') }}"
   class="btn btn-secondary">
Voltar
</a>

<button type="submit"
        class="btn btn-success">
Salvar Alterações
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
