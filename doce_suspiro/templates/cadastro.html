{% extends "base.html" %}

{% block title %}Cadastro de Usuário{% endblock %}

{% block content %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white text-center">
<h4>Criar Conta</h4>
</div>

<div class="card-body">

<form method="POST" onsubmit="return validarSenha()">

<div class="mb-3">
<label class="form-label">Nome Completo</label>
<input type="text"
name="nome"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">Celular</label>
<input type="text"
name="celular"
class="form-control"
placeholder="(31) 99999-9999"
required>
</div>

<div class="row">

<div class="col-md-4 mb-3">
<label class="form-label">CEP</label>
<input type="text"
name="cep"
class="form-control"
placeholder="xx.xxx-xxx"
required>
</div>

<div class="col-md-8 mb-3">
<label class="form-label">Endereço</label>
<input type="text"
name="endereco"
placeholder="Digite o langradouro"
class="form-control"
required>
</div>

</div>

<div class="row">

<div class="col-md-4 mb-3">
<label class="form-label">Número</label>
<input type="text"
name="numero"
class="form-control"
placeholder="Número"
required>
</div>

<div class="col-md-8 mb-3">
<label class="form-label">Bairro</label>
<input type="text"
name="bairro"
class="form-control"
placeholder="Digite o bairro do langradouro"
required>
</div>

</div>

<hr>

<div class="mb-3">
<label class="form-label">Senha</label>
<input type="password"
id="senha"
name="senha"
placeholder="Digite sua senha"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">Confirmar Senha</label>
<input type="password"
id="confirmar_senha"
placeholder="Confirmar Senha"
class="form-control"
required>
</div>

<button type="submit" class="btn btn-success w-100">
Cadastrar-se
</button>

</form>

<div class="text-center mt-3">

<a href="{{ url_for('login') }}">
Voltar para Login
</a>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

function validarSenha(){

let senha = document.getElementById("senha").value
let confirmar = document.getElementById("confirmar_senha").value

if(senha !== confirmar){

alert("As senhas não coincidem!")
return false

}

return true

}

</script>

{% endblock %}
