{% extends "base.html" %}

{% block title %}Editar Produto - DOCE SUSPIRO{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <i class="bi bi-pencil-square"></i> Editar Produto
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Nome do Produto</label>
                        <input type="text"
                               name="nome"
                               class="form-control uppercase-input"
                               value="{{ produto.nome }}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Preço (R$)</label>
                        <input type="number"
                               step="0.01"
                               name="preco"
                               class="form-control"
                               value="{{ produto.preco }}"
                               required>
                    </div>

                    <div class="d-flex justify-content-between">

                        <a href="{{ url_for('produtos') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Voltar
                        </a>

                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i> Atualizar
                        </button>

                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
