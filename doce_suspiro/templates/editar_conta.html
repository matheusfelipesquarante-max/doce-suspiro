{% extends "base.html" %}

{% block title %}Editar Conta - DOCE SUSPIRO{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-warning text-dark">
<i class="bi bi-pencil"></i> Editar Conta Fixa
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label class="form-label">Descrição</label>

<input type="text"
       name="descricao"
       class="form-control"
       value="{{ conta.descricao }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Valor (R$)</label>

<input type="number"
       step="0.01"
       name="valor"
       class="form-control"
       value="{{ conta.valor }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Data de Vencimento</label>

<input type="date"
       name="data_vencimento"
       class="form-control"
       value="{{ conta.data_vencimento }}"
       required>
</div>

<div class="d-flex justify-content-between">

<a href="{{ url_for('contas_fixas') }}"
   class="btn btn-secondary">
Voltar
</a>

<button type="submit"
        class="btn btn-success">
Salvar Alterações
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
