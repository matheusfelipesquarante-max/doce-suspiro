{% extends "base.html" %}

{% block title %}Editar Usuário - DOCE SUSPIRO{% endblock %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-7">

<div class="card shadow">

<div class="card-header bg-warning text-dark">
<i class="bi bi-pencil-square"></i> Editar Usuário
</div>

<div class="card-body">

<form method="POST">

<!-- NOME -->
<div class="mb-3">
<label class="form-label">Nome Completo</label>
<input type="text"
       name="nome"
       class="form-control uppercase-input"
       value="{{ usuario.nome }}"
       required>
</div>

<!-- LOGIN -->
<div class="mb-3">
<label class="form-label">Login</label>
<input type="text"
       name="usuario"
       class="form-control uppercase-input"
       value="{{ usuario.usuario }}"
       required>
</div>

<!-- CELULAR -->
<div class="mb-3">
<label class="form-label">Celular</label>
<input type="text"
       name="celular"
       class="form-control"
       value="{{ usuario.celular }}">
</div>

<!-- CEP E ENDEREÇO -->
<div class="row">

<div class="col-md-4 mb-3">
<label class="form-label">CEP</label>
<input type="text"
       name="cep"
       class="form-control"
       value="{{ usuario.cep }}">
</div>

<div class="col-md-8 mb-3">
<label class="form-label">Endereço</label>
<input type="text"
       name="endereco"
       class="form-control uppercase-input"
       value="{{ usuario.endereco }}">
</div>

</div>

<!-- NUMERO E BAIRRO -->
<div class="row">

<div class="col-md-4 mb-3">
<label class="form-label">Número</label>
<input type="text"
       name="numero"
       class="form-control"
       value="{{ usuario.numero }}">
</div>

<div class="col-md-8 mb-3">
<label class="form-label">Bairro</label>
<input type="text"
       name="bairro"
       class="form-control uppercase-input"
       value="{{ usuario.bairro }}">
</div>

</div>

<hr>

<!-- SENHA -->
<div class="mb-3">
<label class="form-label">Senha</label>
<input type="password"
       name="senha"
       class="form-control"
       value="{{ usuario.senha }}"
       required>
</div>

<!-- NIVEL -->
<div class="mb-3">
<label class="form-label">Nível</label>

<select name="nivel" class="form-select" required>

<option value="0" {% if usuario.nivel == 0 %}selected{% endif %}>
Nível 0 - Operador
</option>

<option value="1" {% if usuario.nivel == 1 %}selected{% endif %}>
Nível 1 - Administrador
</option>

<option value="5" {% if usuario.nivel == 5 %}selected{% endif %}>
Nível 5 - LeadPage / Cliente
</option>

</select>

</div>

<div class="d-flex justify-content-between">

<a href="{{ url_for('usuarios') }}" class="btn btn-secondary">
<i class="bi bi-arrow-left"></i> Voltar
</a>

<button type="submit" class="btn btn-success">
<i class="bi bi-save"></i> Atualizar
</button>

</div>

</form>

</div>

</div>

</div>
</div>

{% endblock %}
